<html lang="pt-BR"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style2.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&amp;family=Roboto:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet">
    <title>Cardapio</title>

    <style>
        /* ── Carrinho flutuante ── */
        .carrinho {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 999;
            background: none;
            border: none;
            cursor: pointer;
        }

        .carrinho-img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        /* ── Cards do cardápio ── */
        .caixa img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
            background: #eee;
        }

        .preco {
            font-weight: 700;
        }

        .options-card {
            width: 100%;
            padding: 0.45rem 0.6rem;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .pedido-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-top: 0.3rem;
        }

        .qty-input {
            width: 60px;
            padding: 0.45rem 0.4rem;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 0.9rem;
            text-align: center;
            font-family: inherit;
        }

        .btn-add {
            flex: 1;
            padding: 0.5rem 0.7rem;
            border: none;
            border-radius: 6px;
            background: #e05c2a;
            color: #fff;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn-add:hover  { opacity: 0.87; transform: scale(1.03); }
        .btn-add:active { transform: scale(0.97); }

        /* ── Toast de confirmação ── */
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #c9a84c;
            color: #1a1209;
            padding: 0.75rem 1.4rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        #toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>

<body>
    <wrapper id="pai">

        <!-- Carrinho flutuante -->
       <button class="carrinho" id="carrinho-btn">
    <img src="./img/comprar-online.png" alt="icone-carrinho" class="carrinho-img">
    <span class="carrinho-label">Carrinho</span>
    <span class="carrinho-badge" id="carrinho-count">0</span>
</button>
        <!-- Navbar -->
        <nav id="browser">
            <button class="menu-buttons" type="button" id="menu-lateral">☰</button>
            <input id="researcher" type="search" placeholder="Pesquisar">
        </nav>

        <div id="overlay"></div>

        <!-- Logo -->
        <section id="div-img">
            <img src="./img/A preferida.jpg" id="Logo-img" alt="logo">
        </section>

        <!-- Menu de navegação do cardápio -->
        <main id="menu">
            <h1 class="title1">Cardápio</h1>
            <div class="buttons-div">
                <button class="menu-buttons" onclick="scrollParaSecao('hamburguers')">Hambúrguers</button>
                <button class="menu-buttons" onclick="scrollParaSecao('pratos')">Pratos</button>
                <button class="menu-buttons" onclick="scrollParaSecao('pasteis')">Pastéis</button>
                <button class="menu-buttons" onclick="scrollParaSecao('saladas')">Saladas</button>
                <button class="menu-buttons" onclick="scrollParaSecao('espetos')">Espetos</button>
                <button class="menu-buttons" onclick="scrollParaSecao('hotdog')">Hot Dog</button>
                <button class="menu-buttons" onclick="scrollParaSecao('especial')">Especial Da Casa</button>
                <button class="menu-buttons" onclick="scrollParaSecao('sucos')">Sucos</button>
                <button class="menu-buttons" onclick="scrollParaSecao('vinhos')">Vinhos</button>
                <button class="menu-buttons" onclick="scrollParaSecao('refrigerantes')">Refrigerantes</button>

        </main>

        <!-- Cards do cardápio -->

    </wrapper>

    <!-- Toast de confirmação -->
