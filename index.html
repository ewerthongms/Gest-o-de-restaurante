<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Restaurante</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🍽️ Restaurante Manager</h1>
  </header>

  <main>
    <section class="card">
      <h2>Mesas</h2>
      <div id="mesas"></div>
    </section>

    <section class="card">
      <h2>Pedidos</h2>
      <ul id="pedidos"></ul>
    </section>

    <section class="card">
      <h2>Adicionar Pedido</h2>
      <input type="text" id="mesa" placeholder="Mesa">
      <input type="text" id="produto" placeholder="Produto">
      <button onclick="addPedido()">Adicionar</button>
    </section>
  </main>

<script src="script.js"></script>
</body>
</html>
